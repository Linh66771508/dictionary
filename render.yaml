services:
  - type: web
    name: viet-dict-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SQLITE_DB_PATH
        value: ./data/dictionary.db
